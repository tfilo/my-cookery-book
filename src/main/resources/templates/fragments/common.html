<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" th:lang="sk">
    <head th:fragment="htmlHeader">
        <title th:text="#{html.head.title}">Recipes</title>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="apple-touch-icon" sizes="180x180" th:href="@{'/icon/apple-touch-icon.png'}">
        <link rel="icon" type="image/png" sizes="32x32" th:href="@{'/icon/favicon-32x32.png'}">
        <link rel="icon" type="image/png" sizes="16x16" th:href="@{'/icon/favicon-16x16.png'}">
        <link rel="manifest" th:href="@{'/icon/site.webmanifest'}">
        <link rel="stylesheet" th:href="@{'/css/fontawesome/css/fontawesome.min.css'}">
        <link rel="stylesheet" th:href="@{'/css/fontawesome/css/solid.min.css'}">
        <link rel="stylesheet" th:href="@{'/css/w3.css'}">
        <link rel="stylesheet" th:href="@{'/css/quill.snow.css'}">
        <link rel="stylesheet" th:href="@{'/css/style.css'}">
        <script th:src="@{'/js/jquery-3.5.1.min.js'}"></script>
        <script th:src="@{'/js/quill-1.3.7.min.js'}"></script>
        <script th:src="@{'/js/quill-paste-smart-1.0.5.min.js'}"></script>
        <script th:src="@{'/js/quill-config.js'}"></script>
        <script th:src="@{'/js/form-controller.js'}"></script>
        <script th:src="@{'/js/sidebar.js'}"></script>
    </head>
    <body>
        <nav th:fragment="menu(content)" onmouseleave="closeSidebar()" class="w3-sidebar w3-bar-block w3-border-right w3-animate-left menu" id="mySidebar">
            <div class="w3-button w3-padding-16 w3-left" onclick="closeSidebar()"><i class="fas fa-angle-double-left"></i></div>
            <a href="javascript:void(0);" th:onclick="|load('content', '@{'/admin/user/all'}', null, true);|" onclick="closeSidebar()" class="w3-bar-item w3-button" sec:authorize="hasRole('ADMIN')"><i class="fas fa-user icon"></i> <span th:text="#{common.users}">Users</span></a>
            <a href="javascript:void(0);" th:onclick="|load('content', '@{'/admin/category/all'}', null, true);|" onclick="closeSidebar()" class="w3-bar-item w3-button" sec:authorize="hasRole('ADMIN')"><i class="fas fa-list icon"></i> <span th:text="#{common.categories}">Categories</span></a>
            <a href="javascript:void(0);" th:onclick="|load('content', '@{'/admin/unitcategory/all'}', null, true);|" onclick="closeSidebar()" class="w3-bar-item w3-button" sec:authorize="hasRole('ADMIN')"><i class="fas fa-prescription-bottle icon"></i> <span th:text="#{common.units}">Units</span></a>
            <a href="javascript:void(0);" th:onclick="|load('content', '@{'/recipe/add'}', null, true);|" onclick="closeSidebar()" class="w3-bar-item w3-button" sec:authorize="hasRole('USER')"><i class="fas fa-pizza-slice icon"></i> <span th:text="#{common.add.recipe}">Add recipe</span></a>
            <hr sec:authorize="isAuthenticated()">
            <a href="javascript:void(0);" th:onclick="|load('content', '@{'/view/categoriesPreview'}', null, true);|" onclick="closeSidebar()" class="w3-bar-item w3-button"><span th:text="#{common.homepage}">Homepage</span></a>
            <hr>
            <div id="categoryLinks">
                <th:block th:each="category, rowStat : ${allCategories}">
                    <a href="javascript:void(0);" th:onclick="|load('content', '@{'/view/recipesByCategory/__${category.id}__'}', null, true);|" onclick="closeSidebar()" class="w3-bar-item w3-button" th:text="${category.name}" th:classappend="${rowStat.last} ? 'margin-bottom-32'">Category name</a>
                </th:block>
            </div>
        </nav>
        <header id="header" th:fragment="header" class="w3-top w3-card transparent-white">
            <div class="w3-button w3-padding-16 w3-left" onclick="openSidebar()"><i class="fas fa-bars"></i></div>
            <div class="w3-right w3-padding-16 padding-right" sec:authorize="!isAuthenticated()">
                <a th:href="@{'/login.html'}"><i class="fas fa-sign-in-alt"></i></a>
            </div>
            <div class="w3-right w3-padding-16 padding-right" sec:authorize="isAuthenticated()">
                <a href="javascript:void(0);" th:onclick="|load('content', '@{'/user/profile'}', null, true);|"><b sec:authentication="name"></b></a><span>&nbsp;&nbsp;</span>
                <a th:href="@{'/logout'}"><i class="fas fa-sign-out-alt"></i></a>
            </div>
            <div class="w3-center w3-wide w3-large page-title" th:text="#{html.head.title}">My Cookery Book</div>
        </header>
    </body>
</html>
