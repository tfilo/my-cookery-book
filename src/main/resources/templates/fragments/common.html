<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" th:lang="sk">
    <head>
        <title>Recipes</title>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
        <link rel="stylesheet" th:href="@{'/css/style.css'}">
    </head>
    <body>
        <nav th:fragment="menu(content)" class="w3-sidebar w3-bar-block w3-card w3-top w3-large w3-animate-left menu" id="mySidebar">
            <a href="javascript:void(0)" onclick="w3_close()"
               class="w3-bar-item w3-button">Close Menu</a>
            <hr sec:authorize="isAuthenticated()">
            <a th:href="@{'/admin/user/all'}" onclick="w3_close()" class="w3-bar-item w3-button" sec:authorize="hasRole('ADMIN')">Users</a>
            <a th:href="@{'/admin/categories'}" onclick="w3_close()" class="w3-bar-item w3-button" sec:authorize="hasRole('ADMIN')">Categories</a>
            <a th:href="@{'/admin/units'}" onclick="w3_close()" class="w3-bar-item w3-button" sec:authorize="hasRole('ADMIN')">Units</a>
            <a th:href="@{'/recipe/add'}" onclick="w3_close()" class="w3-bar-item w3-button" sec:authorize="hasRole('USER')">Pridať recept</a>
            <hr>
            <div th:if="${content=='all'}">
                <a href="#soups" onclick="w3_close()" class="w3-bar-item w3-button">Soups</a>
                <a href="#mainDishes" onclick="w3_close()" class="w3-bar-item w3-button">Main dishes</a>
                <a href="#baking" onclick="w3_close()" class="w3-bar-item w3-button">Baking</a>
            </div>
            <div th:if="${content!='all'}">
                <a th:href="@{'/'}" onclick="w3_close()" class="w3-bar-item w3-button">Back to main page</a>
            </div>
        </nav>
        <div th:fragment="header" class="top w3-card w3-white">
            <div class="w3-button w3-padding-16 w3-left" onclick="w3_open()">☰</div>
            <div class="w3-right w3-padding-16 padding-right" sec:authorize="!isAuthenticated()">
                <a th:href="@{'/login'}">Log in</a>
            </div>
            <div class="w3-right w3-padding-16 padding-right" sec:authorize="isAuthenticated()">
                <b sec:authentication="name"></b><span> </span>
                <a th:href="@{'/logout'}">Log out</a>
            </div>
            <div class="w3-center w3-wide w3-padding-16">My recipes</div>
        </div>
    </body>
</html>
