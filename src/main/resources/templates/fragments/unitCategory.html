<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" th:lang="sk">
    <head>
        <title>Recipes</title>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
        <link rel="stylesheet" th:href="@{'/css/style.css'}">
    </head>
    <body>
        <form method="post" th:if="${unitCategoryBasicSO!=null}" action="javascript:void(0);" id="unitCategoryForm" th:object="${unitCategoryBasicSO}" th:fragment="unitCategoryForm">
            <h2 class="w3-center">Unit Category</h2>
            <input type="hidden" th:field="*{id}"/>
            <p>
                <label class="w3-center">Name <span class="w3-text-red">*</span></label>
                <input class="w3-input w3-border" type="text" th:field="*{name}" maxlength="255">
                <label class="w3-text-red" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Incorrect name</label>
            </p>
            <p>
                <button type="submit" class="w3-button w3-light-green" th:onclick="|submitForm('unitCategoryForm', '@{'/admin/unitcategory/save'}');|"><i class="fas fa-save"></i>&nbsp;<span>Save</span></button>
                <button th:if="*{id}" type="submit" class="w3-button w3-red" th:onclick="|submitForm('unitCategoryForm', '@{'/admin/unitcategory/delete'}');|"><i class="fas fa-trash-alt"></i>&nbsp;<span>Delete</span></button>
                <button type="submit" class="w3-button w3-red" th:onclick="|submitForm('unitCategoryForm', '@{'/admin/unitcategory/cancel'}');|"><i class="fas fa-ban"></i>&nbsp;<span>Cancel</span></button>
            </p>
        </form>
        <div th:fragment="unitCategoriesList">
            <div>
                <div class="w3-right"><a th:href="|javascript:$('#content').load('@{'/admin/unitcategory/add'}');|" class="w3-button w3-xlarge w3-text-green"><i class="fas fa-plus-circle"></i></a></div>
                <div><h2 class="w3-center">Categories / Units</h2></div>
            </div>
            <ul class="w3-ul w3-border margin-bottom-16" th:if="${categories}" th:each="category,rowStat : ${categories}">
                    <li class="w3-row w3-light-grey w3-strong">
                        <span class="w3-col l12 m12 s12"><b><a th:href="|javascript:$('#content').load('@{'/admin/unitcategory/get/__${category.id}__'}');|" th:text="${category.name}"></a></b><a th:href="|javascript:$('#content').load('@{'/admin/unit/add/__${category.id}__'}');|" class="w3-right w3-button w3-large w3-text-green"><i class="fas fa-plus-circle"></i></a></span>
                        <label class="w3-col l8 m8 s9"><b>Unit Name</b></label>
                        <label class="w3-col l4 m4 s3"><b>Abbreviation</b></label>
                    </li>
                    <li class="w3-row" th:each="unit,rowStat : ${category.units}">
                        <a class="w3-col l8 m8 s9" th:href="|javascript:$('#content').load('@{'/admin/unit/get/__${unit.id}__'}');|" th:text="${unit.name}"></a>
                        <span class="w3-col l4 m4 s3" th:text="${unit.abbreviation}"></span>
                    </li>
            </ul>
        </div>
    </body>
</html><a th:href="|javascript:$('#content').load('@{'/admin/unitcategory/add'}');|" class="w3-margin-top w3-right w3-button w3-circle w3-green circle-btn">+</a>
