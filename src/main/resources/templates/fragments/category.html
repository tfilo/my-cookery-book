<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" th:lang="sk">
    <head>
        <title>Recipes</title>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
        <link rel="stylesheet" th:href="@{'/css/style.css'}">
    </head>
    <body>
        <form method="post" th:if="${categorySO!=null}" action="javascript:void(0);" id="categoryForm" th:object="${categorySO}" th:fragment="categoryForm">
            <h2 class="w3-center">Category</h2>
            <input type="hidden" th:field="*{id}"/>
            <p>
                <label class="w3-center">Name <span class="w3-text-red">*</span></label>
                <input class="w3-input w3-border" type="text" th:field="*{name}" maxlength="255">
                <label class="w3-text-red" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Incorrect  name</label>
            </p>
            <p>
                <button type="submit" class="w3-button w3-light-green" th:onclick="|submitForm('categoryForm', '@{'/admin/category/save'}');|"><i class="fas fa-save"></i>&nbsp;<span>Save</span></button>
                <button th:if="*{id}" type="submit" class="w3-button w3-red" th:onclick="|submitForm('categoryForm', '@{'/admin/category/delete'}');|"><i class="fas fa-trash-alt"></i>&nbsp;<span>Delete</span></button>
                <button type="submit" class="w3-button w3-red" th:onclick="|submitForm('categoryForm', '@{'/admin/category/cancel'}');|"><i class="fas fa-ban"></i>&nbsp;<span>Cancel</span></button>
            </p>
        </form>
        <div th:fragment="categoriesList">
            <div>
                <div class="w3-right"><a th:href="|javascript:$('#content').load('@{'/admin/category/add'}');|" class="w3-button w3-xlarge w3-text-green"><i class="fas fa-plus-circle"></i></a></div>
                <div><h2 class="w3-center">Categories</h2></div>
            </div>
            <ul class="w3-ul w3-border" th:if="${categories}">
                <li class="w3-row w3-light-grey w3-strong">
                    <label class="w3-col l12 m12 s12"><b>Category Name</b></label>
                </li>
                <li class="w3-row" th:each="category,rowStat : ${categories}">
                    <a class="w3-col l12 m12 s12" th:href="|javascript:$('#content').load('@{'/admin/category/get/__${category.id}__'}');|" th:text="${category.name}"></a>
                </li>
            </ul>
        </div>
    </body>
</html>
