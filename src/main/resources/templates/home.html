<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" th:lang="sk">
    <head th:replace="fragments/common :: htmlHeader">
    </head>
    <body>
        <div id="loaderOverlay"><div id="loader"></div></div>
        <div id="modal" class="w3-modal">
            <div class="w3-modal-content">
                <header class="w3-container w3-red"> 
                    <h2 th:text="#{common.question}">Question</h2>
                </header>
                <div class="w3-container">
                    <p th:text="#{common.delete.question}">Realy delete?</p>
                </div>
                <footer class="w3-container w3-red w3-padding">
                    <button type="button"
                            id="modalDeleteBtn"
                            class="w3-button">
                        <i class="fas fa-trash-alt"></i>&nbsp;<span th:text="#{common.delete}">Delete</span>
                    </button>
                    <button type="button"
                            onclick="$('#modal').hide();"
                            class="w3-button">
                        <i class="fas fa-ban"></i>&nbsp;<span th:text="#{common.cancel}">Cancel</span>
                    </button>
                </footer>
            </div>
        </div>
        <div id="menu">
            <nav th:replace="fragments/common :: menu">&nbsp;</nav>
        </div>
        <header th:replace="fragments/common :: header">&nbsp;</header>

        <main class="content">
            <div class="spacer">&nbsp;</div>
            <div style="display: none;" id="error">&nbsp;</div>
            <div class="w3-row w3-content w3-padding" id="searchDiv">
                <div class="w3-col w3-button"
                     style="width:50px;"
                     th:onclick="|load('content', '@{'/view/find'}' , { 'title': $('#search').val(), 'categoryId': $('#searchCategoryId').val(), 'page': 0, 'pageSize': 16, 'sortField': 'title', 'direction': 'ASC' }, true);|">
                    <i class="fas fa-search"></i>
                </div>
                <div class="w3-rest">
                    <input type="hidden" id="searchCategoryId" />
                    <input class="w3-input" 
                           type="text" 
                           id="search" 
                           th:placeholder="#{home.search.placeholder}" 
                           th:onkeypress="|if (event.key === 'Enter') load('content', '@{'/view/find'}' , { 'title': $('#search').val(), 'categoryId': $('#searchCategoryId').val(), 'page': 0, 'pageSize': 16, 'sortField': 'title', 'direction': 'ASC' }, true); return event.key != 'Enter';|"/>
                </div>
            </div>
            <div class="w3-main w3-content w3-padding" id="content" th:insert="fragments/__${usedFragment}__">&nbsp;</div>
        </main>
        <script src="https://cdn.jsdelivr.net/npm/cookieconsent@3/build/cookieconsent.min.js" data-cfasync="false"></script>
        <script th:inline="javascript">
            window.cookieconsent.initialise({
                "palette": {
                    "popup": {
                        "background": "#000"
                    },
                    "button": {
                        "background": "#f1d600"
                    }
                },
                "content": {
                    "message": [[#{cookies.consent}]],
                    "dismiss": [[#{cookies.dismiss}]],
                    "link": [[#{cookies.link}]],
                    "href": "https://my-cookery-book.herokuapp.com/cookies"
                }
            });
        </script>
    </body>
</html>
