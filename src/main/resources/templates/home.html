<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" th:lang="sk">
    <head th:replace="fragments/common :: htmlHeader">
    </head>
    <body>
        <nav th:replace="fragments/common :: menu('all') ">&nbsp;</nav>
        <header th:replace="fragments/common :: header ">&nbsp;</header>
        
        <main class="content">
            <div class="spacer">&nbsp;</div>
            <div class="w3-panel w3-red w3-display-container margin-none" style="display: none;" id="error">
                <span onclick="this.parentElement.style.display='none'"
                      class="w3-button w3-large w3-display-topright">&times;</span>
                <h3 th:text="#{home.error}">Error!</h3>
                <p id="errorMessage"></p>
            </div>
            <div class="w3-row w3-content w3-padding" id="searchDiv">
                <div class="w3-col w3-button" style="width:50px;" th:onclick="|javascript:load('content', ($('#searchCategoryId').val() ? '@{'/view/find/'}' + $('#searchCategoryId').val() : '@{'/view/find'}') , { 'title': $('#search').val() });|"><i class="fas fa-search"></i></div>
                <div class="w3-rest">
                    <input type="hidden" id="searchCategoryId" />
                    <input class="w3-input" type="text" id="search" th:placeholder="#{home.search.placeholder}" th:onkeypress="|javascript: if (event.key === 'Enter') load('content', ($('#searchCategoryId').val() ? '@{'/view/find/'}' + $('#searchCategoryId').val() : '@{'/view/find'}') , { 'title': $('#search').val() }); return event.key != 'Enter';|"/>
                </div>
            </div>
            <div class="w3-main w3-content w3-padding" id="content" th:insert="fragments/view :: categoriesPreview">&nbsp;</div>
        </main>
    </body>
</html>
