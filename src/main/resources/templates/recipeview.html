<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" th:lang="sk">
    <head th:replace="fragments/common :: htmlHeader">
    </head>
    <body>
        <div th:replace="fragments/common :: header ">&nbsp;</div>
        <nav th:replace="fragments/common :: menu('administration') ">&nbsp;</nav>

        <div class="content">
            <div class="spacer">&nbsp;</div>
            <article class="w3-main w3-content view w3-padding" id="content" th:object="${recipeViewSO}">
                <div>
                    <a class="w3-button w3-text-green absolute" th:href="@{'/'}"><i class="fas fa-arrow-circle-left w3-xxlarge"></i></a>
                    <h2 class="w3-center" th:text="*{title}">Recipe title</h2>
                </div>
                <input type="hidden" th:field="*{id}"/>

                <section class="padding-8" th:each="section,rowStat : *{sections}">
                    <h4 th:text="*{sections[__${rowStat.index}__].name}" class="bold">Sections name</h4>
                    <h5 th:if="*{not #lists.isEmpty(sections[__${rowStat.index}__].ingredients)}">Ingredients</h5>
                    <ul>
                        <li th:each="ingredient,rowStat2 : *{sections[__${rowStat.index}__].ingredients}">
                            <span th:text="*{sections[__${rowStat.index}__].ingredients[__${rowStat2.index}__].value}">Ingredient value</span> 
                            <span th:text="*{sections[__${rowStat.index}__].ingredients[__${rowStat2.index}__].unit.abbreviation}">Ingredient unit</span>
                            <span th:text="*{sections[__${rowStat.index}__].ingredients[__${rowStat2.index}__].name}">Ingredient name</span>
                        </li>
                    </ul>
                    <h5 th:if="*{not #lists.isEmpty(sections[__${rowStat.index}__].ingredients)}">Method</h5>
                    <div>
                        <input th:field="*{sections[__${rowStat.index}__].method}" th:id="|sections__${rowStat.index}__method|" type="hidden" required></input>
                        <div th:id="|method${rowStat.index}|" class="quill-viewer-div"></div>
                        <script th:inline="javascript">
                            var id = [[${rowStat.index}]];
                            var editor = new Quill('#method' + id, quillReadOnlyConfiguration);
                            editor.setContents(JSON.parse($("#sections" + id + "method").val()));
                        </script>
                    </div>
                </section>
                <hr>
                <section>
                    <div><b>Sources</b></div>
                    <div th:each="source,rowStat : *{sources}"><i><a th:href="${source}" th:text="${source}" target="_blank">Source</a></i></div>
                </section>
                <hr>
                <div class="padding-8">
                    <div th:if="*{creator}">Created by <i th:text="*{creator}">username</i> at <i th:text="*{#temporals.format(created, 'dd.MM.yyyy HH:mm')}" >date</i>.</div>
                    <div th:if="*{modifier}">Modified by <i th:text="*{modifier}">username</i> at <i th:text="*{#temporals.format(modified, 'dd.MM.yyyy HH:mm')}">date</i>.</div>
                </div>
            </article>
        </div>
    </body>
</html>
